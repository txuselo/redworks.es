sections:
  - heading: ¿Qué es el cableado estructurado?
    body: El cableado estructurado es la infraestructura de red física (cobre y
      fibra óptica) que conecta puestos de trabajo, servidores y equipos de
      red dentro de un edificio o entre sedes. Una instalación bien
      dimensionada evita cuellos de botella y facilita futuras ampliaciones
      sin tener que recablear.
  - heading: Cableados de voz y datos
    body: "Colaboramos con los principales fabricantes de cableados de voz y datos,
      asegurando instalaciones que operan de manera impecable. Nos dedicamos
      también a realizar una integración del cableado en:"
  - heading: Networking
    body: "Es fundamental establecer una estructura ágil de electrónica de red para
      lograr la funcionalidad deseada en las infraestructuras. Nosotros contamos
      con sistemas de alta disponibilidad que incluyen:"
