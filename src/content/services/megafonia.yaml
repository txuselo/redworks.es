sections:
  - heading: Los Sistemas de Megafonía Según el Sector
    body: Contamos con las mejores soluciones tecnológicas que impulsarán y
      mejorarán la sonorización en tu entorno. Adaptamos nuestras soluciones
      según el sector, asegurándonos de cumplir con los más altos estándares y
      normativas específicas. En el sector industrial, diseñamos soluciones que
      cumplen rigurosamente con las normativas EN-60849 y EN-54/17, así como con
      las clasificaciones ATEX. Nuestra tecnología de megafonía está diseñada
      para ofrecer un rendimiento excepcional y cumplir con los requisitos de
      seguridad más estrictos. Para el sector educativo, nos esforzamos por
      lograr una comunicación rápida y eficaz. Nuestras soluciones de megafonía
      adaptada permiten la emisión de avisos dirigidos tanto a alumnos como al
      personal, garantizando una comunicación fluida en entornos educativos. En
      el sector retail, la tecnología de megafonía se convierte en una
      herramienta invaluable para transmitir audio de calidad. Adaptamos
      nuestras soluciones para todo tipo de locales, tiendas, espacios de ocio,
      gimnasios y salas de eventos, garantizando una comunicación efectiva y
      envolvente.
