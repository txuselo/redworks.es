sections:
  - heading: ¿Qué es un sistema de megafonía y para qué se usa?
    body: Un sistema de megafonía distribuye avisos y música ambiente mediante
      altavoces conectados a una central de audio, adaptando el volumen y la
      cobertura a cada tipo de espacio. En el sector industrial diseñamos
      soluciones conforme a las normativas EN-60849, EN-54/17 y clasificación
      ATEX; en centros educativos priorizamos la emisión rápida de avisos a
      alumnos y personal; y en retail adaptamos la sonorización a tiendas,
      gimnasios y espacios de ocio.
