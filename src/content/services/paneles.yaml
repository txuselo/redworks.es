  - heading: El autoconsumo es la nueva alternativa
    body: La tecnología de energía solar ha avanzado considerablemente en términos
      de eficiencia y costo en los últimos años, haciendo que los sistemas de
      autoconsumo sean más accesibles y efectivos Esta alternativa es cada vez
      más popular y atractiva en el ámbito de la energía, en el que nosotros
      somos expertos.
