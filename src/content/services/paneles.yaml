sections:
  - heading: ¿Para qué sirven los paneles solares?
    body: La instalación de paneles solares fotovoltaicos es un sistema para
      aprovechar la energía solar y convertirla en electricidad. Utilizamos este
      tipo de instalaciones para generar electricidad limpia y renovable.
  - heading: Precios
    body: Entendemos la importancia de ofrecerte una solución tecnológica, pero
      también rentable. Contamos con opciones de precios competitivos sin
      comprometer la calidad de nuestros productos y servicios Creemos
      firmemente en brindarte información honesta y clara sobre los costos
      asociados con el proceso, contacta con nosotros para obtener tu
      presupuesto.
  - heading: Subvenciones e incentivos
    body: Existen diferentes programas de subvenciones e incentivos fiscales.
      Nuestro equipo te asesorará sobre las opciones disponibles y ayudará a
      aprovechar al máximo estas oportunidades. Programa de Ayudas (Pareer III)
      gestionado por IDEA Bonificaciones fiscales de IBI y ICIO Ayudas del
      Gobierno Central de hasta 3,000€ Si quieres más información sobre los
      programas de ayuda accede aquí. Aprovechando estos incentivos puedes
      conseguir reducir casi la mitad de los costes para la instalación de
      paneles solares.
