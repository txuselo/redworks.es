  - heading: Mantenimiento
    body: Una vez instalados los paneles solares, el mantenimiento adecuado se
      traduce en beneficios a largo plazo para ti, como la prolongación de la
      vida útil.
  - heading: Permisos
    body: La obtención de varios permisos es requerida, ya que implica
      modificaciones en la propiedad. No obstante, los permisos necesarios
      dependen de cada caso en particular. Nosotros nos encargamos de hacer que
      todo este proceso sea lo más fácil y cómodo posible. Te contamos todo lo
      que necesitas saber sobre los permisos necesarios para la instalación de
      los panales solares.
