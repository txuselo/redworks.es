sections:
  - heading: Videovigilancia
    body: "La videovigilancia es un sistema de seguridad que utiliza cámaras de
      video para monitorizar y grabar actividades en tiempo real en un área
      específica. Estas cámaras, también conocidas como cámaras de seguridad,
      están estratégicamente ubicadas para capturar imágenes y videos de eventos
      con el propósito de prevenir incidentes, detectar actividad sospechosa, y
      proporcionar evidencia en caso de que ocurra un incidente. Con los
      sistemas de videovigilancia podrás tener a tu alcance la última tecnología
      para garantizar tu seguridad. Estos sistemas provocan una reacción
      disuasoria frente a robos y proporcionan todos los detalles en caso de que
      ocurra. Trabajamos con los sistemas más modernos de CCTV, tanto en cámaras
      analógicas como tecnología IP. Entre sus características se encuentran:"
  - heading: Control de Accesos
    body: "Los sistemas de control de accesos y presencia son esenciales para
      garantizar la seguridad, proteger activos y controlar el flujo de personas
      en diversas instalaciones. Su versatilidad y capacidad para integrarse con
      otras soluciones de seguridad los convierten en herramientas valiosas para
      la gestión eficiente y segura de espacios. El sistema de control de
      accesos y presencia proporciona prestaciones útiles y de calidad: Podrás
      saber al instante todos los detalles del personal y de los visitantes.
      Conocerás la ubicación, la entrada y las salidas para su correcta gestión.
      Disponemos de sistemas autónomos y centralizados con tecnología IP, Wifi o
      comunicaciones convencionales. Disponer de un sistema de control de
      accesos centralizado agiliza y facilita la mecánica de acceso a unas
      instalaciones; donde antes era necesario pedir llaves o solicitar apertura
      manual de cerraduras, ahora a través de una centralización de los accesos
      se puede facilitar el acceso de manera remota y controlada."
  - heading: Interfonos e Intercomunicaciones
    body: "Los sistemas de interfonía son herramientas versátiles que contribuyen a
      la comunicación interna, la seguridad y el control de accesos en diversos
      entornos. Su implementación puede mejorar la eficiencia y la conveniencia
      en la gestión de la interacción entre diferentes puntos dentro de un
      espacio. El objetivo de un sistema de interfonía es proporcionar el máximo
      control en las instalaciones. Una de las características más importantes
      que debe tener una interfonía es la calidad de audio, motivo por el cual
      en Redworks trabajamos con sistemas:"
