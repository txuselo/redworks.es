sections:
  - heading: ¿Qué es una instalación eléctrica de baja tensión?
    body: Una instalación eléctrica de baja tensión es aquella que funciona con una
      tensión inferior a 1.000 voltios en corriente alterna o 1.500 voltios en
      corriente continua. Este tipo de instalaciones se encuentra en la mayoría
      de viviendas, locales comerciales y edificios.
  - heading: Servicio de instalaciones de nuevos sistemas eléctricos
    body: "En Redworks Solutions, ofrecemos una amplia gama de servicios de
      instalación eléctrica de baja tensión, entre los que se incluyen:"
  - heading: ¿Por qué elegir la instalación eléctrica de baja tensión?
    body: "La instalación eléctrica de baja tensión se posiciona como la opción más
      común y relevante para la mayoría de las aplicaciones por varias razones:"
  - heading: Mantenimiento y ajustes
    body: En nuestra empresa también ofrecemos servicios de mantenimiento y ajustes
      de sistemaseléctricas de baja tensión. Se trata de una serie de tareas
      rutinarias que deben realizarse de forma periódica, como la inspección
      visual de cables, conexiones y componentes, la verificación del correcto
      funcionamiento de dispositivos de protección, la limpieza de contactos y
      la medición de voltajes y corrientes. Los ajustes de los sistemas
      eléctricos de baja tensión se enfocan en optimizar su rendimiento y
      eficiencia. Esto implica la calibración de dispositivos de protección, la
      regulación de voltajes y corrientes, y la optimización del consumo
      energético en función de las necesidades específicas de cada instalación.
