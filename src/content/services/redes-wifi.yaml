  - heading: ¿Qué es una red wifi empresarial?
    body: "Una red wifi empresarial es una instalación de puntos de acceso
      profesionales, planificada según la superficie y los materiales del
      edificio, que garantiza cobertura estable para decenas de dispositivos
      conectados a la vez. A diferencia de un router doméstico, permite
      segmentar el tráfico y escalar la cobertura por plantas o zonas:"
  - heading: Sistemas Punto a Punto
    body: "Como respuesta a la necesidad de unir sedes y ubicaciones entre grandes
      distancias, los sistemas inalámbricos nos aportan una solución de lo más
      flexible. Los sistemas punto a punto ofrecen una forma directa y eficiente
      de establecer comunicación exclusiva entre dos dispositivos. Proporcionan
      eficiencia, seguridad mejorada, menor latencia y flexibilidad,
      convirtiéndolos en una elección valiosa en diversas aplicaciones que van
      desde la conectividad a larga distancia hasta la configuración de redes
      específicas y seguras. Trabajamos mano a mano con los principales
